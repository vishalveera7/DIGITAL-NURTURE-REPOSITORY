<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration - Community Event Portal</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f7f9fb; }
        form {
            max-width: 450px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover { background: #219150; }
        output {
            display: block;
            margin-top: 15px;
            padding: 10px;
            background: #eafaf1;
            border: 1px solid #27ae60;
            border-radius: 5px;
            color: #1e7e42;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2 style="text-align:center;">Event Registration</h2>

    <form id="registrationForm" oninput="regOutput.value = ''">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required autofocus>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>

        <label for="eventDate">Preferred Date</label>
        <input type="date" id="eventDate" name="eventDate" required>

        <label for="eventType">Event Type</label>
        <select id="eventType" name="eventType" required>
            <option value="">-- Select an event --</option>
            <option value="fair">Summer Fair</option>
            <option value="run">Charity Run</option>
            <option value="workshop">Kids Workshop</option>
            <option value="cleanup">Community Cleanup</option>
        </select>

        <label for="message">Message (optional)</label>
        <textarea id="message" name="message" rows="4" placeholder="Any special requirements?"></textarea>

        <button type="submit">Register</button>

        <output name="regOutput" id="regOutput"></output>
    </form>

    <script>
        const form = document.getElementById('registrationForm');
        const output = document.getElementById('regOutput');

        form.addEventListener('submit', function (e) {
            e.preventDefault(); // stop actual page reload for this demo
            const name = document.getElementById('name').value;
            output.value = Thanks, ${name}! Your registration has been received.;
        });
    </script>

</body>
</html>
