<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Gallery</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table {
            border-collapse: collapse;
            margin: auto;
        }
        td {
            text-align: center;
            padding: 15px;
        }
        .eventImg {
            border: 4px solid #2c3e50;
            border-radius: 6px;
            width: 200px;
            height: 140px;
            object-fit: cover;
        }
        caption {
            caption-side: top;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        figcaption { font-size: 0.9em; color: #555; margin-top: 5px; }
    </style>
</head>
<body>

    <table>
        <caption>Past Community Events Gallery</caption>
        <tr>
            <td>
                <figure>
                    <img class="eventImg" src="https://picsum.photos/seed/event1/200/140"
                         alt="Summer Fair 2025" title="Summer Fair 2025">
                    <figcaption>Summer Fair 2025</figcaption>
                </figure>
            </td>
            <td>
                <figure>
                    <img class="eventImg" src="https://picsum.photos/seed/event2/200/140"
                         alt="Charity Run" title="Charity Run">
                    <figcaption>Charity Run</figcaption>
                </figure>
            </td>
            <td>
                <figure>
                    <img class="eventImg" src="https://picsum.photos/seed/event3/200/140"
                         alt="Food Festival" title="Food Festival">
                    <figcaption>Food Festival</figcaption>
                </figure>
            </td>
        </tr>
        <tr>
            <td>
                <figure>
                    <img class="eventImg" src="https://picsum.photos/seed/event4/200/140"
                         alt="Music Night" title="Music Night">
                    <figcaption>Music Night</figcaption>
                </figure>
            </td>
            <td>
                <figure>
                    <img class="eventImg" src="https://picsum.photos/seed/event5/200/140"
                         alt="Kids Workshop" title="Kids Workshop">
                    <figcaption>Kids Workshop</figcaption>
                </figure>
            </td>
            <td>
                <figure>
                    <img class="eventImg" src="https://picsum.photos/seed/event6/200/140"
                         alt="Community Cleanup" title="Community Cleanup">
                    <figcaption>Community Cleanup</figcaption>
                </figure>
            </td>
        </tr>
    </table>

    <!--
        Note: images are loaded from picsum.photos as placeholder photos, so an
        internet connection is needed to see them. Replace the src values with
        your own local image paths (e.g., "images/event1.jpg") if you want to
        use real offline photos instead.
    -->

</body>
</html>
