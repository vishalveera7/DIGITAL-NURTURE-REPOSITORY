<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Color and Background Styling</title>

    <style>
        body{

    font-family: Arial, sans-serif;

    margin: 0;

    padding: 0;

    background-color: #dfe9f3;

    background-image: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb");

    background-size: cover;

    background-position: center;

    background-repeat: no-repeat;

}

.mainHeader{

    padding: 30px;

    text-align: center;

    color: #ffffff;

    background: linear-gradient(
        to right,
        #003366,
        #0059b3
    );

}


.eventSection{

    width: 75%;

    margin: 30px auto;

    padding: 25px;

    border-radius: 10px;

    background-color: rgba(255, 255, 255, 0.85);

}


.eventSection h2{

    color: #cc0000;

    background: linear-gradient(
        to right,
        #ffcccc,
        #ffe6e6
    );

    padding: 10px;

    border-radius: 5px;

}


.newsSection{

    width: 75%;

    margin: 30px auto;

    padding: 25px;

    border-radius: 10px;

    background-color: rgba(255, 255, 255, 0.85);

}


.newsSection h2{

    color: #003366;

    background: linear-gradient(
        to right,
        #cce0ff,
        #e6f0ff
    );

    padding: 10px;

    border-radius: 5px;

}


p{

    font-size: 18px;

    line-height: 1.6;

    color: #333333;

}
    </style>

</head>

<body>


    <header class="mainHeader">

        <h1>Local Community Event Portal</h1>

    </header>

    <section class="eventSection">

        <h2>Upcoming Community Events</h2>

        <p>
            Explore exciting technical, cultural, and social events happening in your city.
        </p>

    </section>

    <section class="newsSection">

        <h2>Latest Announcements</h2>

        <p>
            Stay updated with the latest community programs and activities.
        </p>

    </section>

</body>

</html>
