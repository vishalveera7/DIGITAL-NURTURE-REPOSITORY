<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Table Styling</title>

   <style>

body{

    font-family: Arial, sans-serif;

    background-color: #f2f2f2;

    margin: 0;

    padding: 0;

}


.tableContainer{

    width: 80%;

    margin: 40px auto;

    background-color: white;

    padding: 25px;

    border-radius: 10px;

    box-shadow: 0px 0px 10px gray;

}

h2{

    text-align: center;

    color: darkblue;

    margin-bottom: 20px;

}

table{

    width: 100%;

    border-collapse: collapse;

    text-align: center;

}


th{

    background-color: darkblue;

    color: white;

    padding: 15px;

    border: 2px solid #cccccc;

}


td{

    padding: 12px;

    border: 2px solid #cccccc;

    background-color: #ffffff;

}


tr:nth-child(even){

    background-color: #f0f8ff;

}


   </style>
</head>

<body>

    <div class="tableContainer">

        <h2>Community Event Details</h2>

        <table>

            <tr>

                <th>Event ID</th>

                <th>Event Name</th>

                <th>Date</th>

                <th>Location</th>

            </tr>

            <tr>

                <td>101</td>

                <td>Technical Workshop</td>

                <td>15 June 2026</td>

                <td>City Hall</td>

            </tr>

            <tr>

                <td>102</td>

                <td>Cultural Fest</td>

                <td>20 June 2026</td>

                <td>Community Center</td>

            </tr>

            <tr>

                <td>103</td>

                <td>Sports Tournament</td>

                <td>25 June 2026</td>

                <td>Sports Complex</td>

            </tr>

            <tr>

                <td>104</td>

                <td>Food Carnival</td>

                <td>30 June 2026</td>

                <td>Central Park</td>

            </tr>

        </table>

    </div>

</body>

</html>
