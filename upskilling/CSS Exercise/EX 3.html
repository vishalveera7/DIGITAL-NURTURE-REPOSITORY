<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Selectors Playground</title>

    <style>
   
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}


body{
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
    padding: 20px;
}
#mainHeader{

}

    margin-bottom: 10px;
}

.eventCard{

    padding: 20px;

    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
}
h3,
p{
    color: #444;
    margin-top: 10px;
    line-height: 1.6;
}

</head>

<body>
    <div id="mainHeader">

        <h1>Local Community Event Portal</h1>

    </div>
 <div class="eventCard">

        <h2>Technical Workshop</h2>

        </p>

    </div>

    <div class="eventCard">

        <h2>Cultural Fest</h2>

        <p>
            Enjoy exciting cultural performances.
        </p>

</html>
